apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - configmap.yaml
  - pvc.yaml
  - deployment.yaml
  - service.yaml
  - httproute.yaml

replacements:
  - source:
      kind: ConfigMap
      name: vaultwarden-config
      fieldPath: data.domain
    targets:
      - select:
          kind: Deployment
          name: vaultwarden
        fieldPaths:
          - spec.template.spec.containers.[name=vaultwarden].env.[name=DOMAIN].value
  - source:
      kind: ConfigMap
      name: vaultwarden-config
      fieldPath: data.hostname
    targets:
      - select:
          kind: HTTPRoute
          name: vaultwarden
        fieldPaths:
          - spec.hostnames.0
