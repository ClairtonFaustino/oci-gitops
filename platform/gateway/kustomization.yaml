apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - gatewayclass.yaml
  - gateway-config.yaml
  - envoyproxy.yaml
  - gateway.yaml

replacements:
  - source:
      kind: ConfigMap
      name: gateway-config
      fieldPath: data.externalIP
    targets:
      - select:
          kind: EnvoyProxy
          name: baremetal-proxy
        fieldPaths:
          - spec.provider.kubernetes.envoyService.externalIPs.0
