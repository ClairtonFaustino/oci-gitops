apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: public-gateway
  namespace: default
spec:
  gatewayClassName: eg
  infrastructure:
    parametersRef:
      group: gateway.envoyproxy.io
      kind: EnvoyProxy
      name: baremetal-proxy
      namespace: default
  addresses:
    - type: IPAddress
      value: "129.80.246.47"
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
    - name: https
      protocol: HTTPS
      port: 443
      hostname: vault.129-80-246-47.nip.io
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: vaultwarden-tls
            namespace: default
      allowedRoutes:
        namespaces:
          from: All
