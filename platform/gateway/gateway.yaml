apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: public-gateway
  namespace: default
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  gatewayClassName: eg
  addresses:
    - type: IPAddress
      value: "0.0.0.0"
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
    - name: https
      protocol: HTTPS
      port: 443
      hostname: vault.129-80-246-47.nip.io
      tls:
        mode: Terminate
        certificateRefs:
          - group: ""
            kind: Secret
            name: vaultwarden-tls
            namespace: default
      allowedRoutes:
        namespaces:
          from: All
