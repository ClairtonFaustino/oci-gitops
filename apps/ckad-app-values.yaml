namespace: ckad-apps
replicaCount: 2

image:
  repository: registry.gitlab.com/oci-project/oci-applications/ckad-app
  tag: 1b4cc1aa

service:
  port: 80
  targetPort: 8080

resources:
  requests:
    memory: "64Mi"
    cpu: "100m"
  limits:
    memory: "128Mi"
    cpu: "250m"

probes:
  readiness:
    path: /
    initialDelay: 5
  liveness:
    path: /health
    initialDelay: 10

networkPolicy:
  allowedLabelValue: granted

secrets:
  imagePullSecrets:
    - name: gitlab-registry
  # env:
  #   - name: API_KEY
  #     secretName: app-config
  #     key: API_KEY