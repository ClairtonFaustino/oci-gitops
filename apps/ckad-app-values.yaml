namespace: ckad-apps
replicaCount: 2

image:
  repository: nginx
  tag: 1.25-alpine

service:
  port: 80
  targetPort: 80

resources:
  requests:
    memory: "64Mi"
    cpu: "100m"
  limits:
    memory: "128Mi"
    cpu: "250m"

probes:
  readiness:
    path: /
    initialDelay: 5
  liveness:
    path: /
    initialDelay: 10

networkPolicy:
  allowedLabelValue: granted