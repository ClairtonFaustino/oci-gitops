applications:
  - name: ckad-web-app
    valueFile: ../ckad-app-values.yaml

platformApps:
  - name: public-gateway
    path: platform/gateway
    namespace: default
  - name: vaultwarden
    path: platform/vaultwarden
    namespace: vaultwarden

secrets:
  - name: ckad-apps-secrets
    path: secrets/ckad-apps
    namespace: ckad-apps
