{{- range .Values.platformApps }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .name }}
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://gitlab.com/oci-project/oci-gitops.git'
    targetRevision: HEAD
    path: {{ .path }}
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: {{ .namespace | default "default" }}
  ignoreDifferences:
    - group: gateway.networking.k8s.io
      kind: Gateway
      jqPathExpressions:
        - .metadata.annotations
        - .status
    - group: gateway.networking.k8s.io
      kind: GatewayClass
      jqPathExpressions:
        - .metadata.annotations
        - .status
    - group: gateway.envoyproxy.io
      kind: EnvoyProxy
      jqPathExpressions:
        - .metadata.annotations
        - .spec.provider.kubernetes.envoyDeployment
        - .status
    - group: cert-manager.io
      kind: Certificate
      jqPathExpressions:
        - .status
    - group: cert-manager.io
      kind: ClusterIssuer
      jqPathExpressions:
        - .status
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - RespectIgnoreDifferences=true
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
---
{{- end }}
