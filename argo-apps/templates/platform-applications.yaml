{{- range .Values.platformApps }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .name }}
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://gitlab.com/oci-project/oci-gitops.git'
    targetRevision: HEAD
    path: {{ .path }}
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: {{ .namespace | default "default" }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
---
{{- end }}
