apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ckad-app-preview
  namespace: ${NAMESPACE}
spec:
  parentRefs:
    - name: public-gateway
      namespace: default
  hostnames:
    - "${PREVIEW_HOST}"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: ckad-app
          port: 80
